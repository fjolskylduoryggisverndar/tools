name: Release binaries

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build and release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: |
            sing-geosite/go.sum
            sing-geoip/go.sum

      - name: Build sing-geosite
        run: |
          cd sing-geosite
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -trimpath -o "$GITHUB_WORKSPACE/sing-geosite-linux-amd64" .

      - name: Build sing-geoip
        run: |
          cd sing-geoip
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -trimpath -o "$GITHUB_WORKSPACE/sing-geoip-linux-amd64" .

      - name: Resolve release version from build Go version
        id: go
        run: |
          gover="$(go env GOVERSION)"          # e.g. go1.26.4
          echo "version=v${gover#go}" >> "$GITHUB_OUTPUT"   # e.g. v1.26.4

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.go.outputs.version }}
        run: |
          gh release delete "$TAG" --yes --cleanup-tag || true
          gh release create "$TAG" \
            --title "$TAG" \
            --latest \
            --notes "Prebuilt linux/amd64 binaries of the sing-geoip / sing-geosite parsers, built with $(go env GOVERSION). Consumed by the rules repo CI." \
            sing-geosite-linux-amd64 \
            sing-geoip-linux-amd64
