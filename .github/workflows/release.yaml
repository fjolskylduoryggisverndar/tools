name: Release binaries

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build and release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Build sing-geosite
        run: |
          cd sing-geosite
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -trimpath -o "$GITHUB_WORKSPACE/sing-geosite-linux-amd64" .

      - name: Build sing-geoip
        run: |
          cd sing-geoip
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -trimpath -o "$GITHUB_WORKSPACE/sing-geoip-linux-amd64" .

      - name: Resolve build Go version
        id: go
        run: echo "version=$(go env GOVERSION)" >> "$GITHUB_OUTPUT"

      - name: Publish release tagged with the build Go version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.go.outputs.version }}
        run: |
          gh release delete "$TAG" --yes --cleanup-tag || true
          gh release create "$TAG" \
            --title "$TAG" \
            --latest \
            --notes "Prebuilt linux/amd64 binaries of the sing-geoip / sing-geosite parsers, built with $TAG. Consumed by the rules repo CI." \
            sing-geosite-linux-amd64 \
            sing-geoip-linux-amd64
